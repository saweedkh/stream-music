name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/workflows/backup.yml"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ vars.SSH_PORT || 22 }} ${{ vars.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -azP --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='.next' \
            --exclude='media' \
            --exclude='backups' \
            --exclude='*.pyc' \
            --exclude='.env.production' \
            --exclude='deploy/sync.env' \
            -e "ssh -p ${{ vars.SSH_PORT || 22 }}" \
            ./ ${{ vars.DEPLOY_USER || 'root' }}@${{ vars.DEPLOY_HOST }}:${{ vars.DEPLOY_PATH || '/root/stream-music' }}/

      - name: Run deployment
        run: |
          ssh -p ${{ vars.SSH_PORT || 22 }} ${{ vars.DEPLOY_USER || 'root' }}@${{ vars.DEPLOY_HOST }} \
            "cd ${{ vars.DEPLOY_PATH || '/root/stream-music' }} && bash deploy/up.sh"
