name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: stream_music
          POSTGRES_USER: stream_music
          POSTGRES_PASSWORD: stream_music
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stream_music"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: backend-django
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Django checks
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: stream_music
          POSTGRES_USER: stream_music
          POSTGRES_PASSWORD: stream_music
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-secret-key
          DEBUG: "1"
        run: |
          python manage.py migrate --noinput
          python manage.py check

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: stream_music
          POSTGRES_USER: stream_music
          POSTGRES_PASSWORD: stream_music
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stream_music"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Start backend
        working-directory: backend-django
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: stream_music
          POSTGRES_USER: stream_music
          POSTGRES_PASSWORD: stream_music
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-secret-key
          DEBUG: "1"
          E2E_RATE_LIMIT_OFF: "1"
        run: |
          pip install -r requirements.txt
          python manage.py migrate --noinput
          daphne -b 127.0.0.1 -p 8000 config.asgi:application &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/api/health && break
            sleep 2
          done
      - name: Install frontend & Playwright
        working-directory: frontend-next
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Build & start frontend
        working-directory: frontend-next
        env:
          INTERNAL_API_BASE_URL: http://127.0.0.1:8000
          INTERNAL_WS_BASE_URL: ws://127.0.0.1:8000
        run: |
          npm run build
          npm run start -- -H 127.0.0.1 -p 3000 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:3000/login && break
            sleep 2
          done
      - name: Run Playwright smoke tests
        working-directory: frontend-next
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          PLAYWRIGHT_API_URL: http://127.0.0.1:8000
          CI: "true"
        run: npx playwright test --project=chromium --project=chromium-playback
