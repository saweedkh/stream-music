# Production stack: Postgres + Redis + Django (Daphne) + Next (standalone) + nginx (TLS from host Certbot).
# Usage: ./deploy/up.sh   (see deploy/README.md)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stream_music}
      POSTGRES_USER: ${POSTGRES_USER:-stream_music}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - deploy/.env.runtime.merged
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MEDIA_ROOT: /media
      DJANGO_SETTINGS_MODULE: config.settings
    volumes:
      # Live API source (same as dev compose) — pip/ffmpeg stay in the image; Python code from host.
      - ./apps/api:/app
      - media_data:/media
    command: >
      sh -c "python manage.py migrate --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3); exit(0 if r.status==200 else 1)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  celery-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - deploy/.env.runtime.merged
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MEDIA_ROOT: /media
      DJANGO_SETTINGS_MODULE: config.settings
    volumes:
      - ./apps/api:/app
      - media_data:/media
    command: celery -A config worker -l info --concurrency=2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping -t 5 2>&1 | grep -q OK"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  celery-beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - deploy/.env.runtime.merged
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MEDIA_ROOT: /media
      DJANGO_SETTINGS_MODULE: config.settings
    volumes:
      - ./apps/api:/app
    command: celery -A config beat -l info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_WEBPUSH_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_WEBPUSH_VAPID_PUBLIC_KEY:-BD-yFmmlVLYRgW8U60CnOFCIHQ1YlBw2G7t-obUl4TnG5wttznz5jpmEZT9lx_aA4To7AcniJ7JSLtPZdBZyfD0}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      INTERNAL_API_BASE_URL: http://backend:8000
      INTERNAL_WS_BASE_URL: ws://backend:8000
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      NEXT_PUBLIC_WEBPUSH_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_WEBPUSH_VAPID_PUBLIC_KEY:-BD-yFmmlVLYRgW8U60CnOFCIHQ1YlBw2G7t-obUl4TnG5wttznz5jpmEZT9lx_aA4To7AcniJ7JSLtPZdBZyfD0}
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/nginx-prod-entrypoint.sh"]
    ports:
      - "80:80"
      - "443:443"
      # Same HTTPS config as :443 (matches dev nginx :8443 convention on LAN).
      - "8443:443"
      # Plain HTTP for LAN (must relax SESSION_COOKIE_SECURE — see deploy/up.sh hint).
      - "8080:8080"
    volumes:
      - ./deploy/nginx-prod-entrypoint.sh:/nginx-prod-entrypoint.sh:ro
      - ./deploy/nginx.generated.conf:/etc/nginx/conf.d/00-stream-music.conf:ro
      - ${TLS_CERT_HOST_DIR:-/etc/letsencrypt}:/etc/letsencrypt:ro
      - media_data:/media:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
