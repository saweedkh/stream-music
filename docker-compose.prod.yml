# Production stack: Postgres + Redis + Django (Daphne) + Next (standalone) + Caddy (TLS).
# Usage: ./deploy/up.sh   (see deploy/README.md)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stream_music}
      POSTGRES_USER: ${POSTGRES_USER:-stream_music}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: ./backend-django
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - deploy/.env.runtime.merged
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MEDIA_ROOT: /media
      DJANGO_SETTINGS_MODULE: config.settings
    volumes:
      - media_data:/media
    command: >
      sh -c "python manage.py migrate --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      INTERNAL_API_BASE_URL: http://backend:8000
      INTERNAL_WS_BASE_URL: ws://backend:8000
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile.generated:/etc/caddy/Caddyfile:ro
      - media_data:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  media_data:
  caddy_data:
  caddy_config:
