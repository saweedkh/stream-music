# Install on the host (adjust path to your deploy root):
#   sudo cp deploy/logrotate-stream-music.conf /etc/logrotate.d/stream-music
#
# Rotates docker json-log files for compose project "stream-music" (default project name).

/var/lib/docker/containers/*/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    maxsize 50M
}
