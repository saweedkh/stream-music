services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: stream_music
      POSTGRES_USER: stream_music
      POSTGRES_PASSWORD: stream_music
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend-django
      dockerfile: Dockerfile
    env_file:
      - ./backend-django/.env.example
    volumes:
      - ./backend-django:/app
      - ./media:/media
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      NEXT_PUBLIC_WS_BASE_URL: ws://localhost:8080
    volumes:
      - ./frontend-next:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./media:/media:ro
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
