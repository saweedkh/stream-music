services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: stream_music
      POSTGRES_USER: stream_music
      POSTGRES_PASSWORD: stream_music
    # Host ports avoid clash with local/other Postgres on the server (container still listens on 5432).
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6380:6379"

  backend:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    # Local secrets: cp apps/api/.env.example apps/api/.env (see `make ensure-env`).
    env_file:
      - ./apps/api/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      MEDIA_ROOT: /media
      # LAN phone/tablet via https://<host-ip>:8443 — CSRF/CORS private-IP regex (disable for locked-down prod).
      TRUST_LAN_CSRF: "1"
    volumes:
      - ./apps/api:/app
      - ./media:/media
    command: >
      sh -c "python manage.py migrate --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    # Host 8001 avoids clash with other local services on :8000 (API still on 8000 inside the network).
    ports:
      - "8001:8000"
    depends_on:
      - postgres
      - redis

  celery-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - ./apps/api/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      MEDIA_ROOT: /media
    volumes:
      - ./apps/api:/app
      - ./media:/media
    command: celery -A config worker -l info --concurrency=2
    depends_on:
      - postgres
      - redis

  celery-beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - ./apps/api/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
    volumes:
      - ./apps/api:/app
    command: celery -A config beat -l info
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    env_file:
      - ./apps/web/.env.local
    environment:
      # Client-side API/WS use the browser origin (phone on LAN). SSR calls Django directly:
      INTERNAL_API_BASE_URL: http://backend:8000
      INTERNAL_WS_BASE_URL: ws://backend:8000
      # Next dev rewrites when hitting :3000 directly (in Docker network use backend hostname).
      API_UPSTREAM: http://backend:8000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    volumes:
      - ./apps/web:/app
      # Anonymous volume — Docker seeds it from the image's node_modules on first start.
      - /app/node_modules
    command: npm run dev -- -H 0.0.0.0 -p 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    entrypoint: ["/bin/sh", "/nginx-entrypoint.sh"]
    volumes:
      - ./infra/nginx/nginx-entrypoint.sh:/nginx-entrypoint.sh:ro
      - ./infra/nginx/templates:/templates:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - ./media:/media:ro
    ports:
      # Explicit bind so LAN devices reach nginx from Docker Desktop
      - "0.0.0.0:8080:80"
      - "0.0.0.0:8443:443"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
