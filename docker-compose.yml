services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: stream_music
      POSTGRES_USER: stream_music
      POSTGRES_PASSWORD: stream_music
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend-django
      dockerfile: Dockerfile
    env_file:
      - ./backend-django/.env.example
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
    volumes:
      - ./backend-django:/app
      - ./media:/media
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
    environment:
      # Client-side API/WS use the browser origin (phone on LAN). SSR calls Django directly:
      INTERNAL_API_BASE_URL: http://backend:8000
      INTERNAL_WS_BASE_URL: ws://backend:8000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    volumes:
      - ./frontend-next:/app
      # Isolated node_modules — image deps can be stale; run: docker compose exec frontend npm ci
      - /app/node_modules
    command: npm run dev -- -H 0.0.0.0 -p 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./media:/media:ro
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
