# VPS override: run API from the built image (no live host mount).
# Usage: USE_VPS_COMPOSE=1 ./deploy/up.sh
#
# Keeps media volume; Python code updates require rebuild + up --build.

services:
  backend:
    volumes:
      - media_data:/media

  celery-worker:
    volumes:
      - media_data:/media

  celery-beat:
    volumes: []
