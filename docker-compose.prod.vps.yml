# VPS override: run API from the built image (no live host mount).
# Usage: USE_VPS_COMPOSE=1 ./deploy/up.sh
#
# Media stays on the host bind mount (see MEDIA_HOST_DIR in .env.production);
# Python code updates require rebuild + up --build.

services:
  backend:
    volumes:
      - ${MEDIA_HOST_DIR:-./media}:/media

  celery-worker:
    volumes:
      - ${MEDIA_HOST_DIR:-./media}:/media

  celery-beat:
    volumes: []
